<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGames.88</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --sidebar-width: 280px;
            --accent-ia: #00f2ff;
            --card-bg: rgba(20, 20, 20, 0.8);
            --sidebar-bg: rgba(10, 10, 10, 0.95);
            --modal-bg: #0a0a0a;
            --transition-speed: 0.5s;
        }

        body.light-mode {
            --bg-color: #e0e0e0;
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --sidebar-bg: rgba(240, 240, 240, 0.95);
            --modal-bg: #ffffff;
            --accent-ia: #007bff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* PANTALLA DE BLOQUEO */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #lock-screen.hidden { opacity: 0; visibility: hidden; }
        #lock-input {
            background: transparent; border: none; border-bottom: 2px solid var(--text-color);
            color: var(--text-color); font-family: 'Montserrat'; font-size: 2rem;
            text-align: center; outline: none; padding: 10px; width: 300px;
            letter-spacing: 5px; text-transform: lowercase;
        }
        #lock-screen p { font-weight: 700; letter-spacing: 2px; opacity: 0.5; margin-bottom: 20px; }

        /* CONTENIDO PRINCIPAL ORIGINAL */
        #main-content { opacity: 0; transition: opacity 1s ease; height: 100%; width: 100%; display: none; }
        #main-content.visible { opacity: 1; display: block; }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; display: block; pointer-events: none; }

        .menu-btn {
            position: fixed; top: 25px; left: 25px;
            width: 35px; height: 26px; z-index: 1001;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-btn .bar { width: 100%; height: 4px; background-color: var(--text-color); transition: 0.4s; border-radius: 2px; }
        .menu-btn.open .bar:nth-child(1) { transform: translateY(11px) rotate(45deg); background-color: #ff4d4d; }
        .menu-btn.open .bar:nth-child(2) { opacity: 0; }
        .menu-btn.open .bar:nth-child(3) { transform: translateY(-11px) rotate(-45deg); background-color: #ff4d4d; }

        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width); height: 100%;
            background: var(--sidebar-bg); backdrop-filter: blur(20px);
            z-index: 1000; transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1), background-color var(--transition-speed);
            padding-top: 100px; border-right: 1px solid rgba(128,128,128,0.2);
        }
        .sidebar.active { transform: translateX(var(--sidebar-width)); }
        .sidebar-item {
            padding: 20px 40px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; color: var(--text-color); opacity: 0.6;
            text-transform: uppercase;
        }
        .sidebar-item:hover, .sidebar-item.active { opacity: 1; background: rgba(128,128,128,0.1); }

        .top-right-controls {
            position: fixed; top: 20px; right: 25px;
            display: flex; flex-direction: column; align-items: flex-end; z-index: 100;
        }
        #clock { font-weight: 900; font-size: 1.8rem; margin-bottom: 5px; }
        .theme-toggle {
            background: none; border: 1px solid var(--text-color); color: var(--text-color);
            padding: 5px 12px; cursor: pointer; font-family: 'Montserrat';
            font-weight: 700; border-radius: 20px; font-size: 0.7rem;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        .theme-toggle:hover { background: var(--text-color); color: var(--bg-color); }

        .section { display: none; position: relative; z-index: 50; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; overflow-y: auto; padding-top: 80px; scrollbar-width: none; }
        .section::-webkit-scrollbar { display: none; }
        .section.active { display: flex; }
        
        .main-title { font-size: 4rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; pointer-events: auto; text-align: center;}
        
        .birthday-subtitle { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; margin-top: -10px; margin-bottom: 40px; opacity: 0.8; letter-spacing: 4px; text-align: center;}

        .games-grid { display: grid; grid-template-columns: repeat(3, 250px); gap: 20px; pointer-events: auto; padding: 20px 20px 100px 20px; }

        @media (max-width: 850px) {
            .games-grid { grid-template-columns: repeat(2, 1fr); }
            .main-title { font-size: 3rem; }
            .birthday-subtitle { font-size: 1.2rem; }
        }
        @media (max-width: 550px) {
            .games-grid { grid-template-columns: 1fr; }
        }

        .game-card { background: var(--card-bg); border: 1px solid rgba(128, 128, 128, 0.2); padding: 30px 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--text-color); transform: translateY(-5px); }
        .game-card h3 { margin: 0; font-size: 0.9rem; text-transform: uppercase; }

        #ia-chat { width: 90%; max-width: 600px; height: 60vh; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(128,128,128,0.3); display: flex; flex-direction: column; pointer-events: auto; margin-bottom: 50px;}
        #chat-output { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 0.95rem; }
        .chat-input-area { display: flex; border-top: 1px solid rgba(128,128,128,0.3); padding: 15px; }
        #user-input { flex-grow: 1; background: transparent; border: none; color: var(--text-color); font-family: 'Montserrat'; outline: none; }
        #send-btn { background: var(--text-color); color: var(--bg-color); border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 700; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-content {
            width: 85%; height: 85%; background: var(--modal-bg);
            border: 1px solid rgba(128,128,128,0.2); border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden;
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-bar { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.05); align-items: center; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .close-x { color: #ff4d4d; font-size: 24px; cursor: pointer; border: none; background: none; font-weight: bold; }
        iframe { flex-grow: 1; border: none; background: #000; }


        /* PANTALLA DE CUENTA ATRÁS */
        #countdown-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9998;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease;
        }
        #countdown-screen.visible { opacity: 1; display: flex; }
        
        #cd-title-input {
            background: transparent; border: none; color: var(--text-color);
            font-family: 'Montserrat'; font-size: 3.5rem; font-weight: 900;
            text-align: center; outline: none; text-transform: uppercase;
            margin-bottom: 10px; width: 90%; z-index: 10;
        }
        #cd-date-input {
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.3);
            color: var(--text-color); font-family: 'Montserrat'; font-weight: bold;
            border-radius: 8px; padding: 8px 15px; margin-bottom: 50px; cursor: pointer; outline: none; z-index: 10;
            transition: 0.3s;
        }
        #cd-date-input:hover, #cd-date-input:focus { background: rgba(128,128,128,0.3); }

        .cd-carousel {
            position: relative; width: 350px; height: 350px;
            perspective: 1200px; display: flex; justify-content: center; align-items: center; z-index: 10;
        }

        .post-it {
            width: 300px; height: 300px; background: #929292;
            border-radius: 25px; box-shadow: 10px 15px 35px rgba(0,0,0,0.6), inset -5px -5px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Nunito', sans-serif; color: white;
            position: absolute; transform-origin: center;
        }

        .cd-number { font-size: 8rem; font-weight: 900; line-height: 1; margin-bottom: -15px; }
        .cd-text { font-size: 2rem; font-weight: 800; letter-spacing: 3px; }

        .cd-controls { margin-top: 60px; display: flex; gap: 60px; z-index: 10; }
        .cd-controls button {
            background: none; border: none; color: var(--text-color);
            font-size: 4rem; cursor: pointer; outline: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }
        .cd-controls button:hover { transform: scale(1.3); color: var(--accent-ia); }

        /* Clases de Animación Currada (Efecto Muelle/Spring 3D) */
        .center-active { transform: translateX(0) rotateY(0) scale(1); opacity: 1; transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s; }
        .slide-out-left { transform: translateX(-120%) rotateY(-30deg) scale(0.7); opacity: 0; transition: transform 0.5s ease-in, opacity 0.4s ease-in; }
        .slide-out-right { transform: translateX(120%) rotateY(30deg) scale(0.7); opacity: 0; transition: transform 0.5s ease-in, opacity 0.4s ease-in; }
        .slide-in-left { transform: translateX(-120%) rotateY(-30deg) scale(0.7); opacity: 0; transition: none; }
        .slide-in-right { transform: translateX(120%) rotateY(30deg) scale(0.7); opacity: 0; transition: none; }

    </style>
</head>
<body>

    <div id="lock-screen">
        <p>INTRODUCE EL CÓDIGO</p>
        <input type="password" id="lock-input" placeholder="••••••" autofocus>
    </div>

    <div id="countdown-screen">
        <canvas id="particleCanvasCd" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none;"></canvas>
        
        <input type="text" id="cd-title-input" onchange="updateTitle(this.value)">
        <input type="date" id="cd-date-input" onchange="updateDate(this.value)">
        
        <div class="cd-carousel">
            <div class="post-it center-active" id="post-it">
                <div id="cd-days" class="cd-number">0</div>
                <div class="cd-text">DÍAS</div>
            </div>
        </div>
        
        <div class="cd-controls">
            <button onclick="prevCountdown()">&#10094;</button>
            <button onclick="nextCountdown()">&#10095;</button>
        </div>
        
        <div style="position:absolute; top:20px; right:20px; z-index:100;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtnCd">Modo Claro</button>
        </div>
    </div>

    <div id="main-content">
        <canvas id="particleCanvas"></canvas>
        
        <div class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-item active" onclick="showSection('games')">Juegos</div>
            <div class="sidebar-item" onclick="showSection('ia')">IA Gemini</div>
        </div>

        <div class="top-right-controls">
            <div id="clock">00:00:00</div>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Claro</button>
        </div>

        <section id="games-section" class="section active">
            <h1 class="main-title">UBGames.88</h1>
            <h2 class="birthday-subtitle">Feliz Cumple Valeria</h2>
            
            <div class="games-grid">
                <div class="game-card" onclick="openGame('https://geometrylitepc.io/')"><h3>Geometry Dash</h3></div>
                <div class="game-card" onclick="openGame('https://survival-race.io/')"><h3>Survival Race</h3></div>
                <div class="game-card" onclick="openGame('https://spacewaves.io/')"><h3>Space Waves</h3></div>
                <div class="game-card" onclick="openGame('https://eaglercraft.dev/')"><h3>Minecraft</h3></div>
                <div class="game-card" onclick="openGame('https://rocketsoccerderby.gitlab.io/')"><h3>Rocket League</h3></div>
                <div class="game-card" onclick="openGame('https://theimpostor.es/')"><h3>Impostor</h3></div>
                <div class="game-card" onclick="openGame('https://itsvijaysingh.github.io/Snow-Rider3D/')"><h3>Snow Riding</h3></div>
                <div class="game-card" onclick="openGame('https://pizza-edition-unblocked.github.io/all-games.html')"><h3>Pizza Edition</h3></div>
                <div class="game-card" onclick="openGame('https://23azo.com/')"><h3>23Azo</h3></div>
                <div class="game-card" onclick="openGame('https://23-azo.github.io/')"><h3>23-Azo GitHub</h3></div>
                <div class="game-card" onclick="openGame('https://core-ball.gitlab.io/')"><h3>Core Ball</h3></div>
                <div class="game-card" onclick="openGame('https://1v1-lolunblocked.gitlab.io/')"><h3>1v1.LOL</h3></div>
            </div>
        </section>

        <section id="ia-section" class="section">
            <h1 class="main-title" style="font-size: 3rem;">Gemini IA</h1>
            <div id="ia-chat">
                <div id="chat-output">Escribe algo para empezar...</div>
                <div class="chat-input-area">
                    <input type="text" id="user-input" placeholder="Pregunta algo...">
                    <button id="send-btn" onclick="askGemini()">ENVIAR</button>
                </div>
            </div>
        </section>

        <div id="gameModal" class="modal-overlay" onclick="if(event.target === this) closeGame()">
            <div class="modal-content">
                <div class="modal-bar">
                    <button style="color:var(--text-color); background:none; border:1px solid rgba(128,128,128,0.5); padding:5px 12px; cursor:pointer; border-radius:4px;" onclick="toggleFS()">PANTALLA COMPLETA</button>
                    <button class="close-x" onclick="closeGame()">&times;</button>
                </div>
                <iframe id="gameFrame" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DE CONTRASEÑAS MULTIPLES
        const lockInput = document.getElementById('lock-input');
        const lockScreen = document.getElementById('lock-screen');
        const mainContent = document.getElementById('main-content');
        const cdScreen = document.getElementById('countdown-screen');

        lockInput.addEventListener('input', (e) => {
            const code = e.target.value.toLowerCase();
            if (code === 'castor') {
                lockScreen.classList.add('hidden');
                mainContent.style.display = 'block';
                setTimeout(() => {
                    mainContent.classList.add('visible');
                    lockScreen.style.display = 'none';
                    initCanvas('particleCanvas'); // Inicia partículas del principal
                }, 500);
            } else if (code === 'tiempo') {
                lockScreen.classList.add('hidden');
                cdScreen.style.display = 'flex';
                setTimeout(() => {
                    cdScreen.classList.add('visible');
                    lockScreen.style.display = 'none';
                    updatePostItContent(); // Carga la primera cuenta atrás
                    initCanvas('particleCanvasCd'); // Inicia partículas del fondo
                }, 500);
            }
        });

        // --------------------------------------------------------
        // LÓGICA DE LA CUENTA ATRÁS (CARRUSEL)
        // --------------------------------------------------------
        let countdowns = [
            { name: "Verano", date: "2026-06-21" },
            { name: "Halloween", date: "2026-10-31" },
            { name: "Navidad", date: "2026-12-25" }
        ];
        let cdIndex = 0;
        let isAnimating = false;

        const postIt = document.getElementById('post-it');
        const cdTitleInput = document.getElementById('cd-title-input');
        const cdDateInput = document.getElementById('cd-date-input');
        const cdDays = document.getElementById('cd-days');

        function getDays(targetDate) {
            const now = new Date();
            const target = new Date(targetDate);
            const diff = target.getTime() - now.getTime();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return days > 0 ? days : 0;
        }

        function updatePostItContent() {
            cdTitleInput.value = countdowns[cdIndex].name;
            cdDateInput.value = countdowns[cdIndex].date;
            cdDays.textContent = getDays(countdowns[cdIndex].date);
        }

        // Permite editar y guardar la info de la cuenta actual
        function updateTitle(val) { countdowns[cdIndex].name = val; }
        function updateDate(val) { countdowns[cdIndex].date = val; updatePostItContent(); }

        function nextCountdown() {
            if(isAnimating) return;
            isAnimating = true;
            postIt.className = 'post-it slide-out-left'; // Animación de salida
            
            setTimeout(() => {
                cdIndex = (cdIndex + 1) % countdowns.length;
                updatePostItContent();
                postIt.className = 'post-it slide-in-right'; // Prepara entrada
                void postIt.offsetWidth; // Fuerza repintado del navegador
                postIt.className = 'post-it center-active'; // Animación de entrada
                setTimeout(() => { isAnimating = false; }, 700);
            }, 400); 
        }

        function prevCountdown() {
            if(isAnimating) return;
            isAnimating = true;
            postIt.className = 'post-it slide-out-right';
            
            setTimeout(() => {
                cdIndex = (cdIndex - 1 + countdowns.length) % countdowns.length;
                updatePostItContent();
                postIt.className = 'post-it slide-in-left';
                void postIt.offsetWidth;
                postIt.className = 'post-it center-active';
                setTimeout(() => { isAnimating = false; }, 700);
            }, 400);
        }

        // --------------------------------------------------------
        // CÓDIGO ORIGINAL (IA, Reloj, Temas, Partículas)
        // --------------------------------------------------------
        const API_KEY = "AIzaSyCeSAza9EzpyakNSRMeXvMN47XeXFcVNNk"; 

        function toggleSidebar() {
            document.getElementById('menuBtn').classList.toggle('open');
            document.getElementById('sidebar').classList.toggle('active');
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            toggleSidebar();
        }

        function updateClock() {
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').textContent = new Intl.DateTimeFormat('es-ES', options).format(new Date());
        }
        setInterval(updateClock, 1000); updateClock();

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-mode');
            const text = body.classList.contains('light-mode') ? "Modo Oscuro" : "Modo Claro";
            document.getElementById('themeBtn').textContent = text;
            if(document.getElementById('themeBtnCd')) document.getElementById('themeBtnCd').textContent = text;
        }

        // Sistema de Partículas Modificado para soportar múltiples canvas
        let particles = [];
        let activeCanvas = null;
        let ctx = null;

        function initCanvas(canvasId) { 
            activeCanvas = document.getElementById(canvasId);
            if(!activeCanvas) return;
            ctx = activeCanvas.getContext('2d');
            activeCanvas.width = window.innerWidth; 
            activeCanvas.height = window.innerHeight; 
            if(particles.length === 0) drawParticles(); // Inicia el bucle si no está corriendo
        }
        window.addEventListener('resize', () => { if(activeCanvas) initCanvas(activeCanvas.id); });

        function drawParticles() {
            if(!ctx || !activeCanvas) return;
            ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
            if (Math.random() > 0.85) {
                particles.push({ x: Math.random() * activeCanvas.width, y: -10, r: Math.random() * 2 + 1, v: Math.random() * 2 + 1 });
            }
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.y += p.v;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                if (p.y > activeCanvas.height + 10) particles.splice(i, 1);
            }
            requestAnimationFrame(drawParticles);
        }

        function openGame(url) {
            const modal = document.getElementById('gameModal');
            document.getElementById('gameFrame').src = url;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeGame() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; document.getElementById('gameFrame').src = ''; }, 300);
        }

        function toggleFS() { if (!document.fullscreenElement) document.getElementById('gameFrame').requestFullscreen(); else document.exitFullscreen(); }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('chat-output');
            const msg = input.value.trim();
            if(!msg || !API_KEY) return;

            output.innerHTML += `<div><b>Tú:</b> ${msg}</div>`;
            input.value = "";
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            const loadingId = "loading-" + Date.now();
            output.innerHTML += `<div id="${loadingId}" style="opacity:0.5;"><i>Pensando...</i></div>`;
            output.scrollTop = output.scrollHeight;

            try {
                const resp = await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error.message);
                const text = data.candidates[0].content.parts[0].text;
                document.getElementById(loadingId).remove();
                output.innerHTML += `<div style="color:var(--accent-ia); margin-bottom:15px;"><b>Gemini:</b> ${text}</div>`;
            } catch (e) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                output.innerHTML += `<div style="color:#ff4d4d;">Error. Verifica la consola (F12).</div>`;
                console.error("Error Gemini:", e);
            }
            output.scrollTop = output.scrollHeight;
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') askGemini(); });
    </script>
</body>
</html>
