<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGames.88 | Minimalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --sidebar-width: 280px;
            --accent-ia: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        #particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; display: block; }

        /* MENU BOTÓN */
        .menu-btn {
            position: fixed; top: 25px; left: 25px;
            width: 35px; height: 26px; z-index: 1001;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;
        }
        .menu-btn .bar { width: 100%; height: 4px; background-color: #fff; transition: 0.4s; border-radius: 2px; }
        .menu-btn.open .bar:nth-child(1) { transform: translateY(11px) rotate(45deg); background-color: #ff4d4d; }
        .menu-btn.open .bar:nth-child(2) { opacity: 0; }
        .menu-btn.open .bar:nth-child(3) { transform: translateY(-11px) rotate(-45deg); background-color: #ff4d4d; }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width); height: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            z-index: 1000; transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            padding-top: 100px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar.active { transform: translateX(var(--sidebar-width)); }
        .sidebar-item {
            padding: 20px 40px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }
        .sidebar-item:hover, .sidebar-item.active { color: #fff; background: rgba(255,255,255,0.05); }

        /* SECCIONES */
        .section { display: none; position: relative; z-index: 50; flex-direction: column; align-items: center; justify-content: center; height: 100vh; pointer-events: none; }
        .section.active { display: flex; }

        .main-title {
            font-size: 5rem; font-weight: 900; text-transform: uppercase; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.4); margin-bottom: 40px; pointer-events: auto;
        }

        .games-grid { display: grid; grid-template-columns: repeat(2, 280px); gap: 25px; pointer-events: auto; }
        .game-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: #fff; transform: translateY(-5px); }

        /* CHAT IA */
        #ia-chat { width: 90%; max-width: 600px; height: 50vh; background: rgba(15, 15, 15, 0.9); border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; pointer-events: auto; }
        #chat-output { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 0.95rem; }
        .chat-input-area { display: flex; border-top: 1px solid #333; padding: 15px; }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; font-family: 'Montserrat'; outline: none; }
        #send-btn { background: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: 700; }

        #clock { position: fixed; top: 25px; right: 140px; font-weight: 900; font-size: 1.6rem; z-index: 100; }
        #clearBtn { position: fixed; top: 25px; right: 25px; background: none; border: 1px solid #fff; color: #fff; padding: 8px 15px; cursor: pointer; z-index: 100; font-family: 'Montserrat'; font-weight: 700; border-radius: 4px; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 2000; }
        .modal-bar { display: flex; justify-content: space-between; padding: 10px 25px; background: #0a0a0a; align-items: center; }
        .close-x { color: #ff3333; font-size: 30px; cursor: pointer; border: none; background: none; font-weight: bold; }
        iframe { flex-grow: 1; border: none; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <div class="menu-btn" id="menuBtn" onclick="toggleSidebar()">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item active" onclick="showSection('games')">Juegos</div>
        <div class="sidebar-item" onclick="showSection('ia')">IA Gemini</div>
    </div>
    <div id="clock">00:00:00</div>
    <button id="clearBtn" onclick="clearParticles()">VACIAR</button>

    <section id="games-section" class="section active">
        <h1 class="main-title">UBGames.88</h1>
        <div class="games-grid">
            <div class="game-card" onclick="openGame('https://geometrylitepc.io/')"><h3>Geometry Lite</h3></div>
            <div class="game-card" onclick="openGame('https://survival-race.io/')"><h3>Survival Race</h3></div>
            <div class="game-card" onclick="openGame('https://spacewaves.io/')"><h3>Space Waves</h3></div>
            <div class="game-card" onclick="openGame('https://smashkarts.io/')"><h3>Smash Karts</h3></div>
        </div>
    </section>

    <section id="ia-section" class="section">
        <h1 class="main-title" style="font-size: 3rem;">Gemini IA</h1>
        <div id="ia-chat">
            <div id="chat-output">Escribe algo para empezar...</div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Pregunta algo...">
                <button id="send-btn" onclick="askGemini()">ENVIAR</button>
            </div>
        </div>
    </section>

    <div id="gameModal" class="modal">
        <div class="modal-bar">
            <button style="color:#fff; background:none; border:1px solid #fff; padding:5px; cursor:pointer;" onclick="toggleFS()">FULLSCREEN</button>
            <button class="close-x" onclick="closeGame()">X</button>
        </div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('menuBtn').classList.toggle('open');
            document.getElementById('sidebar').classList.toggle('active');
        }
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            toggleSidebar();
        }
        function updateClock() {
            const options = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').textContent = new Intl.DateTimeFormat('es-ES', options).format(new Date());
        }
        setInterval(updateClock, 1000); updateClock();

        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [], staticP = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas); initCanvas();
        function clearParticles() { particles = []; staticP = []; }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() > 0.9) particles.push({x: Math.random()*canvas.width, y: -10, r: Math.random()*2+1, v: Math.random()*2+1});
            ctx.fillStyle = "white";
            staticP.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.y += p.v;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                if (p.y >= canvas.height - 5) { staticP.push(p); particles.splice(i, 1); }
            }
            if (staticP.length > 2000) staticP.shift();
            requestAnimationFrame(draw);
        }
        draw();

        function openGame(url) { document.getElementById('gameFrame').src = url; document.getElementById('gameModal').style.display = 'flex'; }
        function closeGame() { document.getElementById('gameModal').style.display = 'none'; document.getElementById('gameFrame').src = ''; }
        function toggleFS() { if (!document.fullscreenElement) document.getElementById('gameModal').requestFullscreen(); else document.exitFullscreen(); }

        // --- IA GEMINI ---
        async function askGemini() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('chat-output');
            const msg = input.value.trim();
            if(!msg) return;

            output.innerHTML += `<div><b>Tú:</b> ${msg}</div>`;
            input.value = "";
            
            // PEGA TU CLAVE REAL AQUÍ DENTRO DE LAS COMILLAS
            const API_KEY = "PEGA_AQUI_TU_CLAVE"; 
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const loadingId = "loading-" + Date.now();
            output.innerHTML += `<div id="${loadingId}" style="color:#666;"><i>Pensando...</i></div>`;
            output.scrollTop = output.scrollHeight;

            try {
                const resp = await fetch(URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
                });
                const data = await resp.json();
                const text = data.candidates[0].content.parts[0].text;
                document.getElementById(loadingId).remove();
                output.innerHTML += `<div style="color:var(--accent-ia); margin-bottom:15px;"><b>Gemini:</b> ${text}</div>`;
            } catch (e) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                output.innerHTML += `<div style="color:#ff4d4d;">Error de conexión.</div>`;
            }
            output.scrollTop = output.scrollHeight;
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') askGemini(); });
    </script>
</body>
</html>
