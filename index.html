<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGames.88</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Nunito:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --sidebar-width: 280px;
            --accent-ia: #00f2ff;
            --card-bg: rgba(20, 20, 20, 0.8);
            --sidebar-bg: rgba(10, 10, 10, 0.95);
            --modal-bg: #0a0a0a;
            --transition-speed: 0.5s;
        }

        body.light-mode {
            --bg-color: #e0e0e0;
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.8);
            --sidebar-bg: rgba(240, 240, 240, 0.95);
            --modal-bg: #ffffff;
            --accent-ia: #007bff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* BOTÓN SALIR GLOBAL */
        .exit-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 77, 77, 0.2); border: 1.5px solid #ff4d4d;
            color: #ff4d4d; font-family: 'Nunito', sans-serif; font-size: 0.7rem;
            padding: 6px 15px; border-radius: 20px; cursor: pointer; z-index: 10000;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .exit-btn:hover { background: #ff4d4d; color: white; transform: translateX(-50%) scale(1.1); }

        /* PANTALLA DE BLOQUEO */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #lock-screen.hidden { opacity: 0; pointer-events: none; }
        #lock-input {
            background: transparent; border: none; border-bottom: 2px solid var(--text-color);
            color: var(--text-color); font-family: 'Montserrat'; font-size: 2rem;
            text-align: center; outline: none; padding: 10px; width: 300px;
            letter-spacing: 5px; text-transform: lowercase;
        }
        #lock-screen p { font-weight: 700; letter-spacing: 2px; opacity: 0.5; margin-bottom: 20px; }

        /* CONTENIDO PRINCIPAL */
        #main-content { opacity: 0; transition: opacity 1s ease; height: 100%; width: 100%; display: none; }
        #main-content.visible { opacity: 1; display: block; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        .menu-btn { position: fixed; top: 25px; left: 25px; width: 35px; height: 26px; z-index: 1001; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-btn .bar { width: 100%; height: 4px; background-color: var(--text-color); transition: 0.4s; border-radius: 2px; }
        .menu-btn.open .bar:nth-child(1) { transform: translateY(11px) rotate(45deg); background-color: #ff4d4d; }
        .menu-btn.open .bar:nth-child(2) { opacity: 0; }
        .menu-btn.open .bar:nth-child(3) { transform: translateY(-11px) rotate(-45deg); background-color: #ff4d4d; }

        .sidebar { position: fixed; top: 0; left: calc(-1 * var(--sidebar-width)); width: var(--sidebar-width); height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(20px); z-index: 1000; transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding-top: 100px; border-right: 1px solid rgba(128,128,128,0.2); }
        .sidebar.active { transform: translateX(var(--sidebar-width)); }
        .sidebar-item { padding: 20px 40px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; color: var(--text-color); opacity: 0.6; text-transform: uppercase; }
        .sidebar-item:hover, .sidebar-item.active { opacity: 1; background: rgba(128,128,128,0.1); }

        .top-right-controls { position: fixed; top: 20px; right: 25px; display: flex; flex-direction: column; align-items: flex-end; z-index: 100; }
        #clock { font-weight: 900; font-size: 1.8rem; margin-bottom: 5px; }
        .theme-toggle { background: none; border: 1px solid var(--text-color); color: var(--text-color); padding: 5px 12px; cursor: pointer; font-family: 'Montserrat'; font-weight: 700; border-radius: 20px; font-size: 0.7rem; transition: all 0.3s ease; text-transform: uppercase; }

        .section { display: none; position: relative; z-index: 50; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; overflow-y: auto; padding-top: 80px; }
        .section.active { display: flex; }
        .main-title { font-size: 4rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; text-align: center;}
        .birthday-subtitle { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; margin-top: -10px; margin-bottom: 40px; opacity: 0.8; letter-spacing: 4px; text-align: center;}

        .games-grid { display: grid; grid-template-columns: repeat(3, 250px); gap: 20px; padding-bottom: 100px; }
        .game-card { background: var(--card-bg); border: 1px solid rgba(128, 128, 128, 0.2); padding: 30px 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--text-color); transform: translateY(-5px); }

        /* CUENTA ATRÁS */
        #countdown-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9998; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s ease; }
        #countdown-screen.visible { opacity: 1; display: flex; }
        #cd-title-input { background: transparent; border: none; color: var(--text-color); font-family: 'Montserrat'; font-size: 3.5rem; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 90%; margin-bottom: 10px; }
        #cd-date-input { background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.3); color: var(--text-color); font-family: 'Montserrat'; font-weight: bold; border-radius: 8px; padding: 8px 15px; margin-bottom: 50px; outline: none; }
        .cd-carousel { position: relative; width: 350px; height: 350px; perspective: 1200px; display: flex; justify-content: center; align-items: center; }
        .post-it { width: 300px; height: 300px; background: #929292; border-radius: 25px; box-shadow: 10px 15px 35px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Nunito', sans-serif; color: white; position: absolute; }
        .cd-number { font-size: 8rem; font-weight: 900; line-height: 1; margin-bottom: -15px; }
        .cd-text { font-size: 2rem; font-weight: 800; letter-spacing: 3px; }
        .cd-controls { margin-top: 60px; display: flex; gap: 60px; }
        .cd-controls button { background: none; border: none; color: var(--text-color); font-size: 4rem; cursor: pointer; transition: 0.3s; }

        /* Animaciones */
        .center-active { transform: translateX(0) rotateY(0) scale(1); opacity: 1; transition: transform 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s; }
        .slide-out-left { transform: translateX(-120%) rotateY(-30deg) scale(0.7); opacity: 0; transition: transform 0.5s ease-in; }
        .slide-out-right { transform: translateX(120%) rotateY(30deg) scale(0.7); opacity: 0; transition: transform 0.5s ease-in; }
        .slide-in-left { transform: translateX(-120%) rotateY(-30deg) scale(0.7); opacity: 0; transition: none; }
        .slide-in-right { transform: translateX(120%) rotateY(30deg) scale(0.7); opacity: 0; transition: none; }

        #ia-chat { width: 90%; max-width: 600px; height: 60vh; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(128,128,128,0.3); display: flex; flex-direction: column; margin-bottom: 80px;}
        #chat-output { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <p>INTRODUCE EL CÓDIGO</p>
        <input type="password" id="lock-input" placeholder="••••••" autofocus>
    </div>

    <div id="main-content">
        <canvas id="particleCanvas"></canvas>
        <button class="exit-btn" onclick="logout()">Salir</button>
        <div class="menu-btn" id="menuBtn" onclick="toggleSidebar()"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-item active" onclick="showSection('games')">Juegos</div>
            <div class="sidebar-item" onclick="showSection('ia')">IA Gemini</div>
        </div>
        <div class="top-right-controls">
            <div id="clock">00:00:00</div>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Claro</button>
        </div>
        <section id="games-section" class="section active">
            <h1 class="main-title">UBGames.88</h1>
            <h2 class="birthday-subtitle">Feliz Cumple Valeria</h2>
            <div class="games-grid">
                <div class="game-card" onclick="openGame('https://geometrylitepc.io/')"><h3>Geometry Dash</h3></div>
                <div class="game-card" onclick="openGame('https://survival-race.io/')"><h3>Survival Race</h3></div>
                <div class="game-card" onclick="openGame('https://spacewaves.io/')"><h3>Space Waves</h3></div>
                <div class="game-card" onclick="openGame('https://eaglercraft.dev/')"><h3>Minecraft</h3></div>
                <div class="game-card" onclick="openGame('https://rocketsoccerderby.gitlab.io/')"><h3>Rocket League</h3></div>
                <div class="game-card" onclick="openGame('https://theimpostor.es/')"><h3>Impostor</h3></div>
                <div class="game-card" onclick="openGame('https://itsvijaysingh.github.io/Snow-Rider3D/')"><h3>Snow Riding</h3></div>
                <div class="game-card" onclick="openGame('https://pizza-edition-unblocked.github.io/all-games.html')"><h3>Pizza Edition</h3></div>
            </div>
        </section>
        <section id="ia-section" class="section">
            <h1 class="main-title" style="font-size: 3rem;">Gemini IA</h1>
            <div id="ia-chat">
                <div id="chat-output">Escribe algo para empezar...</div>
                <div class="chat-input-area" style="display:flex; padding:15px; border-top:1px solid rgba(128,128,128,0.3);">
                    <input type="text" id="user-input" style="flex:1; background:transparent; border:none; color:inherit; outline:none;" placeholder="Pregunta algo...">
                    <button id="send-btn" onclick="askGemini()" style="background:var(--text-color); color:var(--bg-color); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">ENVIAR</button>
                </div>
            </div>
        </section>
    </div>

    <div id="countdown-screen">
        <canvas id="particleCanvasCd" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        <button class="exit-btn" onclick="logout()">Salir</button>
        <input type="text" id="cd-title-input" onchange="updateTitle(this.value)">
        <input type="date" id="cd-date-input" onchange="updateDate(this.value)">
        <div class="cd-carousel">
            <div class="post-it center-active" id="post-it">
                <div id="cd-days" class="cd-number">0</div>
                <div class="cd-text">DÍAS</div>
            </div>
        </div>
        <div class="cd-controls">
            <button onclick="prevCountdown()">&#10094;</button>
            <button onclick="nextCountdown()">&#10095;</button>
        </div>
    </div>

    <script>
        const lockInput = document.getElementById('lock-input');
        const lockScreen = document.getElementById('lock-screen');
        const mainContent = document.getElementById('main-content');
        const cdScreen = document.getElementById('countdown-screen');

        lockInput.addEventListener('input', (e) => {
            const code = e.target.value.toLowerCase();
            if (code === 'castor') {
                lockScreen.classList.add('hidden');
                mainContent.style.display = 'block';
                setTimeout(() => { mainContent.classList.add('visible'); initCanvas('particleCanvas'); }, 500);
            } else if (code === 'tiempo') {
                lockScreen.classList.add('hidden');
                cdScreen.style.display = 'flex';
                setTimeout(() => { cdScreen.classList.add('visible'); updatePostItContent(); initCanvas('particleCanvasCd'); }, 500);
            }
        });

        function logout() {
            // Reiniciar vistas
            mainContent.classList.remove('visible');
            cdScreen.classList.remove('visible');
            setTimeout(() => {
                mainContent.style.display = 'none';
                cdScreen.style.display = 'none';
                lockScreen.classList.remove('hidden');
                lockInput.value = '';
                lockInput.focus();
            }, 500);
        }

        let countdowns = [{ name: "Verano", date: "2026-06-21" }, { name: "Navidad", date: "2026-12-25" }];
        let cdIndex = 0;
        let isAnimating = false;
        const postIt = document.getElementById('post-it');

        function updatePostItContent() {
            document.getElementById('cd-title-input').value = countdowns[cdIndex].name;
            document.getElementById('cd-date-input').value = countdowns[cdIndex].date;
            const diff = new Date(countdowns[cdIndex].date) - new Date();
            document.getElementById('cd-days').textContent = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        }

        function nextCountdown() {
            if(isAnimating) return; isAnimating = true;
            postIt.className = 'post-it slide-out-left';
            setTimeout(() => {
                cdIndex = (cdIndex + 1) % countdowns.length;
                updatePostItContent();
                postIt.className = 'post-it slide-in-right';
                void postIt.offsetWidth;
                postIt.className = 'post-it center-active';
                setTimeout(() => isAnimating = false, 700);
            }, 400);
        }

        function prevCountdown() {
            if(isAnimating) return; isAnimating = true;
            postIt.className = 'post-it slide-out-right';
            setTimeout(() => {
                cdIndex = (cdIndex - 1 + countdowns.length) % countdowns.length;
                updatePostItContent();
                postIt.className = 'post-it slide-in-left';
                void postIt.offsetWidth;
                postIt.className = 'post-it center-active';
                setTimeout(() => isAnimating = false, 700);
            }, 400);
        }

        function updateTitle(v) { countdowns[cdIndex].name = v; }
        function updateDate(v) { countdowns[cdIndex].date = v; updatePostItContent(); }

        // Reloj y Partículas (Simplificado para el ejemplo)
        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-ES', {hour12:false}); }
        setInterval(updateClock, 1000);
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('menuBtn').classList.toggle('open'); }
        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id+'-section').classList.add('active'); toggleSidebar(); }

        let particles = [];
        let ctx = null; let canv = null;
        function initCanvas(id) { canv = document.getElementById(id); ctx = canv.getContext('2d'); canv.width = window.innerWidth; canv.height = window.innerHeight; if(particles.length === 0) render(); }
        function render() {
            ctx.clearRect(0,0,canv.width,canv.height);
            if(Math.random()>0.9) particles.push({x:Math.random()*canv.width, y:-10, v:Math.random()*2+1});
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
            particles.forEach((p,i) => { p.y+=p.v; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); if(p.y>canv.height) particles.splice(i,1); });
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
